<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문상세</title>
    <link rel="stylesheet" href="실습.css">
</head>

<body>

    <!-- 주문상세 전체 영역 -->
    <div class="전체박스">

        <!-- 주문상세 제목 -->
        <div class="제목박스">
            <h2 class="주문상세제목">주문상세</h2>
        </div>


        <!-- 메뉴 정보 영역 -->
        <div class="메뉴박스">

            <!-- 메뉴 이미지 -->
            <div class="이미지박스">
                <img
                    src="아메리카노.png"
                    alt="아메리카노"
                    class="메뉴이미지"
                >
            </div>

            <!-- 메뉴 이름과 가격 -->
            <div class="메뉴정보">

                <div class="메뉴정보줄">
                    <span class="정보제목">메뉴 :</span>
                    <span class="정보내용">아메리카노</span>
                </div>

                <div class="메뉴정보줄">
                    <span class="정보제목">가격 :</span>
                    <span class="정보내용">4000원</span>
                </div>

            </div>

        </div>


        <!-- 샷 선택 -->
        <div class="선택박스">

            <h5 class="글자">샷</h5>

            <label>
                <input
                    type="radio"
                    name="샷여부"
                    value="연하게"
                >
                연하게(-1샷)
            </label>

            <label>
                <input
                    type="radio"
                    name="샷여부"
                    value="샷추가"
                >
                샷추가(+1샷)
            </label>

        </div>


        <!-- 사이즈 선택 -->
        <div class="선택박스">

            <h5 class="글자">사이즈 선택</h5>

            <div class="box1">

                <label>
                    <input
                        type="radio"
                        name="사이즈"
                        value="Regular"
                        checked
                    >
                    <span class="사이즈1">Regular</span>
                </label>

                <label>
                    <input
                        type="radio"
                        name="사이즈"
                        value="Large"
                    >
                    Large
                </label>

            </div>

        </div>


        <!-- 먹고 가기 또는 가지고 가기 -->
        <div class="선택박스">

            <h5 class="글자">포장 여부</h5>

            <div class="box2">

                <label>
                    <input
                        type="radio"
                        name="가져가기"
                        value="먹고가기"
                        checked
                    >
                    <span class="먹기1">먹고가기</span>
                </label>

                <label>
                    <input
                        type="radio"
                        name="가져가기"
                        value="가지고가기"
                    >
                    가지고가기
                </label>

            </div>

        </div>


        <!-- 온도 선택 -->
        <div class="선택박스">

            <h5 class="글자">온도</h5>

            <div class="box3">

                <label>
                    <input
                        type="radio"
                        name="온도여부"
                        value="Hot"
                    >
                    <span class="온도1">Hot</span>
                </label>

                <label>
                    <input
                        type="radio"
                        name="온도여부"
                        value="Ice"
                        checked
                    >
                    Ice
                </label>

            </div>

        </div>


        <!-- 수량과 주문하기 버튼 -->
        <div class="box4">
            <!-- 수량 선택 -->
            <div class="box5">
                <span class="수량글자">수량</span>
                <button
                    type="button"
                    class="버튼2"
                    id="minus"
                >
                    -
                </button>
                <span id="count">1</span>
                <button
                    type="button"
                    class="버튼2"
                    id="plus"
                >
                    +
                </button>

            </div>


            <!-- 주문하기 -->
            <div class="box6">
                <button
                    type="button"
                    class="버튼1"
                >
                    주문하기
                </button>

            </div>

        </div>

    </div>


    <!-- 자바스크립트 연결 -->
    <script src="실습11.js"></script>

</body>

</html>
