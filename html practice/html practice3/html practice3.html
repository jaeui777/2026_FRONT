<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>달력 만들기</title>
</head>

<body>

    <h1>달력 만들기</h1>

    <!-- 위쪽 버튼과 월 선택 -->
    <button></button>
    <input type="month">
    <button></button>

    <br><br>

    <!-- 달력 표 -->
    <table border="2" width="600" height="600">

        <!-- 달력 제목 -->
        <tr>
            <th colspan="7">
                <h2>2023년 1월</h2>
            </th>
        </tr>

        <!-- 요일 -->
        <tr>
            <th>일</th>
            <th>월</th>
            <th>화</th>
            <th>수</th>
            <th>목</th>
            <th>금</th>
            <th>토</th>
        </tr>

        <!-- 첫 번째 주 -->
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
            <td>5</td>
            <td>6</td>
            <td>7</td>
        </tr>

        <!-- 두 번째 주 -->
        <tr>
            <td>8</td>
            <td>9</td>
            <td>10</td>
            <td>11</td>
            <td>12</td>
            <td>13</td>
            <td>14</td>
        </tr>

        <!-- 세 번째 주 -->
        <tr>
            <td>15</td>
            <td>16</td>
            <td>17</td>
            <td>18</td>
            <td>19</td>
            <td>20</td>
            <td>21</td>
        </tr>

        <!-- 네 번째 주 -->
        <tr>
            <td>22</td>
            <td>23</td>
            <td>24</td>
            <td>25</td>
            <td>26</td>
            <td>27</td>
            <td>28</td>
        </tr>

        <!-- 다섯 번째 주 -->
        <tr>
            <td>29</td>
            <td>30</td>
            <td>31</td>
            
        </tr>

    </table>

</body>

</html>
